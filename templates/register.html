{% extends 'base.html' %}
{% block title %}Identity Registration | HRMS Core{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5 glass-card p-4 rounded-4 shadow-lg animate-slide-up">
        <div class="text-center mb-4">
            <h3 class="text-white mb-1 fw-bold">Register Identity</h3>
            <p class="text-muted small">Establish a verified credential profile inside the ledger</p>
        </div>

        <form method="POST" action="{{ url_for('register') }}" id="registerForm" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="row">
                <div class="col-sm-6 mb-3 input-group-custom">
                    <label class="form-label text-muted small fw-semibold">Employee ID</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-id-badge field-icon"></i>
                        <input type="text" name="employee_id" id="employee_id" class="form-control" placeholder="EMP-2026-001" required>
                    </div>
                </div>
                <div class="col-sm-6 mb-3 input-group-custom">
                    <label class="form-label text-muted small fw-semibold">Access Allocation Role</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user-gear field-icon"></i>
                        <select name="role" id="role" class="form-select form-control" required>
                            <option value="Employee" selected>Employee Domain</option>
                            <option value="HR">HR Administrator</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="mb-3 input-group-custom">
                <label class="form-label text-muted small fw-semibold">Corporate Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope field-icon"></i>
                    <input type="email" name="email" id="email" class="form-control" placeholder="name@company.com" required>
                </div>
            </div>

            <div class="mb-3 input-group-custom">
                <label class="form-label text-muted small fw-semibold">Create Password Matrix</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                    <button type="button" class="btn-toggle-password" data-target="password">
                        <i class="fa-solid fa-eye text-muted"></i>
                    </button>
                </div>
                
                <!-- Security Strength Matrix Meter Indicator -->
                <div class="password-strength-container mt-2">
                    <div class="progress progress-xs bg-dark-soft rounded-pill" style="height: 4px;">
                        <div id="strengthMeterBar" class="progress-bar transition-all" role="progressbar" style="width: 0%"></div>
                    </div>
                    <span id="strengthMeterText" class="text-muted extra-small mt-1 d-block text-end">Cryptographic Strength: None</span>
                </div>
            </div>

            <div class="mb-4 input-group-custom">
                <label class="form-label text-muted small fw-semibold">Confirm Password Matrix</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-check-double field-icon"></i>
                    <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="••••••••" required>
                    <button type="button" class="btn-toggle-password" data-target="confirm_password">
                        <i class="fa-solid fa-eye text-muted"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary-gradient w-100 py-2.5 rounded-3 fw-semibold d-flex align-items-center justify-content-center gap-2" id="submitBtn">
                <span>Provision Identity Workspace</span>
                <div class="spinner-border spinner-border-sm d-none" id="loadingSpinner" role="status"></div>
            </button>
        </form>

        <div class="text-center mt-4 pt-3 border-top border-glass">
            <p class="text-muted small mb-0">Already initialized inside ledger? <a href="{{ url_for('login') }}" class="link-accent text-decoration-none fw-semibold">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock %}
