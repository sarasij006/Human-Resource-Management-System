{% extends 'base.html' %}
{% block title %}Execute Credential Overwrite | HRMS Core{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4 glass-card p-4 rounded-4 shadow-lg animate-slide-up">
        <div class="text-center mb-4">
            <h3 class="text-white mb-1 fw-bold">Overwrite Matrix</h3>
            <p class="text-muted small">Define your new cryptographic security phrase mapping</p>
        </div>

        <form method="POST" action="{{ url_for('reset_password', token=token) }}" id="resetForm" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3 input-group-custom">
                <label class="form-label text-muted small fw-semibold">New Password Matrix</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                    <button type="button" class="btn-toggle-password" data-target="password">
                        <i class="fa-solid fa-eye text-muted"></i>
                    </button>
                </div>
                
                <div class="password-strength-container mt-2">
                    <div class="progress progress-xs bg-dark-soft rounded-pill" style="height: 4px;">
                        <div id="strengthMeterBar" class="progress-bar transition-all" role="progressbar" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="mb-4 input-group-custom">
                <label class="form-label text-muted small fw-semibold">Confirm Overwrite Input</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-check-double field-icon"></i>
                    <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="••••••••" required>
                    <button type="button" class="btn-toggle-password" data-target="confirm_password">
                        <i class="fa-solid fa-eye text-muted"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary-gradient w-100 py-2.5 rounded-3 fw-semibold d-flex align-items-center justify-content-center gap-2" id="submitBtn">
                <span>Apply Matrix Cryptographic Patch</span>
                <div class="spinner-border spinner-border-sm d-none" id="loadingSpinner" role="status"></div>
            </button>
        </form>
    </div>
</div>
{% endblock %}
