{% extends 'base.html' %}
{% block title %}Reset Authorization Token Request | HRMS Core{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4 glass-card p-4 rounded-4 shadow-lg animate-slide-up">
        <div class="text-center mb-4">
            <h3 class="text-white mb-1 fw-bold">Recover Access</h3>
            <p class="text-muted small">Enter the email assigned to your Employee ID profile</p>
        </div>

        <form method="POST" action="{{ url_for('forgot_password') }}" id="forgotForm" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-4 input-group-custom">
                <label class="form-label text-muted small fw-semibold">Corporate Email Address</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope field-icon"></i>
                    <input type="email" name="email" id="email" class="form-control" placeholder="name@company.com" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary-gradient w-100 py-2.5 rounded-3 fw-semibold d-flex align-items-center justify-content-center gap-2" id="submitBtn">
                <span>Dispatch Recovery Payload</span>
                <div class="spinner-border spinner-border-sm d-none" id="loadingSpinner" role="status"></div>
            </button>
        </form>

        <div class="text-center mt-4 pt-3 border-top border-glass">
            <a href="{{ url_for('login') }}" class="link-accent text-decoration-none small fw-semibold"><i class="fa-solid fa-arrow-left me-1"></i> Return to Terminal Access</a>
        </div>
    </div>
</div>
{% endblock %}
